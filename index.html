<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gaye. - Günlük İlham ve Motivasyon</title>
    <style>
        /* Genel Stil Ayarları */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, serif;
            /* İstediğin Koyu Mavi Gradient */
            background: linear-gradient(135deg, #0a192f 0%, #112240 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #f1f5f9;
            overflow: hidden;
            text-align: center;
        }

        .container {
            padding: 20px;
        }

        /* Gaye. Başlık Stili */
        h1 {
            font-size: clamp(4rem, 15vw, 7rem); /* Mobilde küçülür, masaüstünde büyür */
            font-weight: 700;
            font-family: "Times New Roman", serif; /* Şık reader fontu hissi için */
            letter-spacing: -2px;
            margin-bottom: 20px;
            opacity: 0.95;
        }

        /* Destek ve Mail Bölümü */
        .support-section {
            margin-top: 50px;
            font-size: 1rem;
            color: #94a3b8; /* Hafif sönük mavi-gri */
        }

        .support-label {
            display: block;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 0.8rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        .email-link {
            color: #f1f5f9;
            text-decoration: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 1.1rem;
            transition: opacity 0.3s ease;
            border-bottom: 1px solid rgba(241, 245, 249, 0.3);
            padding-bottom: 2px;
        }

        .email-link:hover {
            opacity: 0.7;
            border-bottom-color: #f1f5f9;
        }

        /* Arka plan için çok hafif bir derinlik efekti */
        .bg-glow {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(100, 255, 218, 0.05);
            filter: blur(100px);
            border-radius: 50%;
            z-index: -1;
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">
        <h1>Gaye.</h1>

        <div class="support-section">
            <span class="support-label">Destek</span>
            <a href="mailto:gaye.app.contact@gmail.com" class="email-link">
                gaye.app.contact@gmail.com
            </a>
        </div>
    </div>

</body>
</html>
